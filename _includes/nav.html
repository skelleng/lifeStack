<nav class="navbar">
  <div class="nav-left">
    <a href="{{ '/' | relative_url }}">LifeStack</a>
  </div>

  <div class="nav-center">
    <a href="{{ '/cook/' | relative_url }}" class="{% if page.url contains '/cook/' %}active{% endif %}">Cook</a>
    <a href="{{ '/clean/' | relative_url }}" class="{% if page.url contains '/clean/' %}active{% endif %}">Clean</a>
    <a href="{{ '/build/' | relative_url }}" class="{% if page.url contains '/build/' %}active{% endif %}">Build</a>
  </div>

  <div class="nav-right">
    <input type="text" id="searchBox" placeholder="Search…">
    <button onclick="toggleTheme()" id="themeToggle">🌓</button>
    <a href="{{ '/about/' | relative_url }}" class="{% if page.url contains '/about/' %}active{% endif %}">About</a>
  </div>
</nav>

<div id="searchResults"></div>

<script>
  const toggleTheme = () => {
    const body = document.body;
    const isDark = body.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  };

  const storedTheme = localStorage.getItem('theme');
  if (storedTheme) {
    document.body.classList.add(storedTheme);
  } else {
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (prefersDark) document.body.classList.add('dark');
  }

  const searchBox = document.getElementById("searchBox");
  const results = document.getElementById("searchResults");
  let posts = [];

  async function fetchPosts() {
    const res = await fetch('{{ "/search.json" | relative_url }}');
    posts = await res.json();
  }

  fetchPosts();

  searchBox.addEventListener("input", function () {
    const query = this.value.toLowerCase();
    if (query.length < 2) {
      results.style.display = "none";
      return;
    }

    const matches = posts.filter(post => post.title.toLowerCase().includes(query));
    results.innerHTML = matches.map(post =>
      `<div><a href="${post.url}">${post.title}</a></div>`
    ).join('');
    results.style.display = matches.length ? "block" : "none";
  });
</script>
